server {
  listen 80;
  server_name _;
  merge_slashes on;

  root /usr/share/nginx/html;
  index index.html;

  location = /healthz {
    access_log off;
    default_type text/plain;
    return 200 "ok\n";
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Nginx aplica las locations sobre la URI normalizada. La expresion
  # case-insensitive, junto con merge_slashes, bloquea variantes simples de
  # mayusculas, barras duplicadas y percent-encoding antes del proxy /api/.
  location ~* ^/api/automatizaciones(?:/|$) {
    access_log off;
    default_type application/json;
    return 404 '{"ok":false,"message":"Ruta no encontrada","code":"ROUTE_NOT_FOUND"}';
  }

  location /api/ {
    proxy_pass http://backend:3001/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}
