# ENTORNO DE DESARROLLO LOCAL EXCLUSIVAMENTE.
# Publica puertos y no incorpora controles suficientes para Internet o produccion.
# Copie .env.example a .env, genere secretos unicos y complete los campos vacios.
# Docker Compose detendra la carga si falta una variable secreta obligatoria.

services:
  postgres:
    image: postgres:16-alpine
    container_name: cap-prenatal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-cap_prenatal}"
      POSTGRES_USER: "${POSTGRES_USER:-cap_prenatal_app}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Defina POSTGRES_PASSWORD en el archivo .env local}"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cap_prenatal_app} -d ${POSTGRES_DB:-cap_prenatal}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: cap-prenatal-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: "${POSTGRES_DB:-cap_prenatal}"
      DB_USER: "${POSTGRES_USER:-cap_prenatal_app}"
      DB_PASSWORD: "${POSTGRES_PASSWORD:?Defina POSTGRES_PASSWORD en el archivo .env local}"
      DB_SSL: "false"
      DB_SSL_REJECT_UNAUTHORIZED: "false"
      JWT_SECRET: "${JWT_SECRET:?Defina JWT_SECRET en el archivo .env local}"
      JWT_EXPIRES_IN: 8h
      PORT: 3001
      NODE_ENV: development
      FRONTEND_URL: "${FRONTEND_URL:-http://localhost:8080,http://localhost:5173}"
      COOKIE_SAMESITE: "${COOKIE_SAMESITE:-lax}"
      PDF_EXCEL_ENGINE: libreoffice
      LIBREOFFICE_PATH: /usr/bin/soffice
      AUTOMATION_SECRET: "${AUTOMATION_SECRET:?Defina AUTOMATION_SECRET en el archivo .env local}"
      SEED_DIRECTOR_NAME: "${SEED_DIRECTOR_NAME:-}"
      SEED_DIRECTOR_USERNAME: "${SEED_DIRECTOR_USERNAME:-}"
      SEED_DIRECTOR_PASSWORD: "${SEED_DIRECTOR_PASSWORD:-}"
      SEED_CONFIRM_PRODUCTION: "${SEED_CONFIRM_PRODUCTION:-}"
    ports:
      - "3001:3001"

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: cap-prenatal-n8n
    restart: unless-stopped
    environment:
      GENERIC_TIMEZONE: America/Guatemala
      TZ: America/Guatemala
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      N8N_RUNNERS_ENABLED: "true"
      WEBHOOK_URL: http://localhost:5678/
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: cap-prenatal-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres_data:
  n8n_data:
